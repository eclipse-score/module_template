name: On PR
on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]

permissions:
  pull-requests: write
  issues: write


jobs:
  license-check:
    uses: eclipse-score/cicd-workflows/.github/workflows/license-check.yml@829b3e11ccbf924a5782f7bfed647cb1619fdf78 # v0.0.1
    with:
      repo-url: "${{ github.server_url }}/${{ github.repository }}"
      bazel-target: "run --lockfile_mode=error //:license-check"
    secrets:
      dash-api-token: ${{ secrets.ECLIPSE_GITLAB_API_TOKEN }}

  pre-commit:
    name: 🔬 Pre-Commit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out
        uses: actions/checkout@v6
      - name: 🛠️ Install pre-commit
        run: pip install pre-commit
      - name: ✅ Run pre-commit
        run: pre-commit run --all-files
